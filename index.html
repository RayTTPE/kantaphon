<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="logo"data-aos="zoom-in" data-aos-duration="1500">
      Kantaphon <span>Leng</span>
    </div>
    <div class="nav-container">
      <div class="links">
        <a href=""data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">Home</a>
        <a href=""data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">Skills</a>
        <a href=""data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">Introduction</a>
        <a href=""data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">Service</a>
        <a href=""data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">Contact</a>
      </div>
    </div>
    <!-- ปุ่มเปิดเมนู -->
    <i class="fa-solid fa-bars ham" onclick="openmenu()"></i>
    <div class="dropdown">
      <div class="links">
        <a href="">Home</a>
        <a href="">Skills</a>
        <a href="">Introduction</a>
        <a href="">Service</a>
        <a href="">Contact</a>
        <!-- ปุ่มปิดเมนู -->
        <i class="fa-solid fa-xmark cancel" onclick="closemenu()"></i>
      </div>
    </div>
  </nav>

  <section>
    <div class="main-container">
      <div class="content">
        <h1 data-aos="fade-right" data-aos-duration="1500" data-aos-delay="600">สวัสดีครับ ผม <span>Kantaphon</span></h1>
        <div data-aos="fade-left" data-aos-duration="1500" data-aos-delay="800" class="typewriter">I'm a <span class="typewriter-text"></span><label for="">|</label></div>
        <p data-aos="flip-down" data-aos-duration="1500" data-aos-delay="1000">Designing the system through to post‑delivery support – Elevating professionalism through continuous learning.</p>
        <div class="social-links">
          <i class="fa-brands fa-github" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="1200"></i>
          <i class="fa-brands fa-facebook" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="1300"></i>
          <i class="fa-brands fa-instagram" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="1400"></i>
          <i class="fa-brands fa-line" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="1500"></i>
        </div>
        <button data-aos="zoom-in" data-aos-duration="1500" data-aos-delay="1700">Contact me</button>
      </div>
      <div class="image" data-aos="zoom-in" data-aos-duration="2000">
        <img src="Ray.jpg" alt="">
      </div>
    </div>
  </section>
  <script>
    function openmenu() {
      const navbar = document.querySelector(".dropdown");
      navbar.style.transform = "translateY(0)";
    }

    function closemenu() {
      const navbar = document.querySelector(".dropdown");
      navbar.style.transform = "translateY(-500px)";
    }

    const texts = [
      "DEVELOPER",
      "PROGRAMMER",
      "DESIGNER"
    ];

    const speed = 100;
    const textElement = document.querySelector(".typewriter-text");

    let textIndex = 0;
    let characterIndex = 0;

    function typeWriter() {
      if (characterIndex < texts[textIndex].length) {
        textElement.innerHTML += texts[textIndex].charAt(characterIndex);
        characterIndex++;
        setTimeout(typeWriter, speed);
      } else {
        setTimeout(eraseText, 1000); // รอหน่อยก่อนลบ
      }
    }

    function eraseText() {
      if (textElement.innerHTML.length > 0) {
        textElement.innerHTML = textElement.innerHTML.slice(0, -1);
        setTimeout(eraseText, 50);
      } else {
        textIndex = (textIndex + 1) % texts.length;
        characterIndex = 0;
        setTimeout(typeWriter, 500);
      }
    }

    window.onload = typeWriter;
  </script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({offset:0});
  </script>
</body>
</html>
