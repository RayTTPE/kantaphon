<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- ใช้ style.css ของคุณ -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="logo">
      Kantaphon <span>Leng</span>
    </div>
    <div class="nav-container">
      <div class="links">
        <a href="">Home</a>
        <a href="">Skills</a>
        <a href="">Introduction</a>
        <a href="">Service</a>
        <a href="">Contact</a>
      </div>
    </div>
    <!-- ปุ่มเปิดเมนู -->
    <i class="fa-solid fa-bars ham" onclick="openmenu()"></i>
    <div class="dropdown">
      <div class="links">
        <a href="">Home</a>
        <a href="">Skills</a>
        <a href="">Introduction</a>
        <a href="">Service</a>
        <a href="">Contact</a>
        <!-- ปุ่มปิดเมนู -->
        <i class="fa-solid fa-xmark cancel" onclick="closemenu()"></i>
      </div>
    </div>
  </nav>

  <section>
    <div class="main-container">
      <div class="content">
        <h1>สวัสดีครับ ผม <span>Kantaphon</span></h1>
        <div class="typewriter">I'm a <span class="typewriter-text"><label for="">|</div>
        <p>Designing the system through to post‑delivery support – Elevating professionalism through continuous learning.</p>
        <div class="social-links">
          <i class="fa-brands fa-github"></i>
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-line"></i>
        </div>
        <button>Contact me</button>
      </div>
      <div class="image">
        <img src="Ray.jpg" alt="">
      </div>
    </div>
  </section>
  <script>
    function openmenu() {
      const navbar = document.querySelector(".dropdown");
      navbar.style.transform = "translateY(0)";
    }

    function closemenu() {
      const navbar = document.querySelector(".dropdown");
      navbar.style.transform = "translateY(-500px)";
    }
  </script>
</body>
</html>
